name: Deploy to SPENT-staging

on:
  push:
    branches: [SPENT-staging]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: SPENT-staging

      - name: Setup deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Push to SPENT-staging.git
        run: |
          git remote add deploy git@github.com:azelinc/SPENT-staging.git
          git push deploy SPENT-staging:main --force
